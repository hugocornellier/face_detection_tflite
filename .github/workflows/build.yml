name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_FORMAT_VERSION: '3.41.7'

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_FORMAT_VERSION }}
          channel: stable
          cache: true

      - name: Install root dependencies
        run: flutter pub get

      - name: Install example dependencies
        run: flutter pub get
        working-directory: example

      - name: Install web example dependencies
        run: flutter pub get
        working-directory: example_web

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

  analyze:
    name: Analyze (${{ matrix.flutter-channel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Install root dependencies
        run: flutter pub get

      - name: Install example dependencies
        run: flutter pub get
        working-directory: example

      - name: Install web example dependencies
        run: flutter pub get
        working-directory: example_web

      - name: Analyze root package
        run: flutter analyze --fatal-infos .

      - name: Analyze example app
        run: flutter analyze --fatal-infos .
        working-directory: example

      - name: Analyze web example app
        run: flutter analyze --fatal-infos .
        working-directory: example_web

  build-android:
    name: Build Android (${{ matrix.flutter-channel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('example/android/**/*.gradle*', 'android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build APK (debug)
        working-directory: example
        # Retry to ride out the flaky Android NDK side-by-side download
        # ("Archive is not a ZIP archive") that intermittently corrupts on the
        # CI runner; the re-download almost always succeeds on the next attempt.
        run: |
          for attempt in 1 2 3; do
            if flutter build apk --debug; then exit 0; fi
            echo "::warning::build attempt $attempt failed; retrying"
            sleep 10
          done
          echo "::error::flutter build apk failed after 3 attempts"
          exit 1

  build-ios:
    name: Build iOS (${{ matrix.flutter-channel }})
    runs-on: macos-15
    strategy:
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      # Keep the iOS workaround for now; newer Flutter beta still prefers SPM here
      - name: Disable Swift Package Manager
        run: flutter config --no-enable-swift-package-manager

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: example/ios/Pods
          key: pods-ios-${{ hashFiles('example/ios/Podfile.lock') }}
          restore-keys: pods-ios-

      - name: Build iOS (no codesign)
        run: flutter build ios --debug --no-codesign
        working-directory: example

  build-macos:
    name: Build macOS (${{ matrix.flutter-channel }})
    runs-on: macos-15
    strategy:
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Build macOS
        run: flutter build macos --debug
        working-directory: example

  build-linux:
    name: Build Linux (${{ matrix.flutter-channel }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache opencv_dart native build
        uses: actions/cache@v5
        with:
          path: example/.dart_tool/hooks_runner/shared
          key: opencv-native-linux-${{ hashFiles('pubspec.lock', 'example/pubspec.lock') }}
          restore-keys: opencv-native-linux-

      - name: Build Linux
        run: flutter build linux --debug
        working-directory: example

  build-windows:
    name: Build Windows (${{ matrix.flutter-channel }})
    runs-on: windows-latest
    strategy:
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache opencv_dart native build
        uses: actions/cache@v5
        with:
          path: example/.dart_tool/hooks_runner/shared
          key: opencv-native-windows-${{ hashFiles('pubspec.lock', 'example/pubspec.lock') }}
          restore-keys: opencv-native-windows-

      - name: Build Windows
        run: flutter build windows --debug
        working-directory: example
