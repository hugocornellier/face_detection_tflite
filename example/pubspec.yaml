name: face_detection_tflite_example
description: Example app for face_detection_tflite
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  opencv_dart: 2.2.1+4
  image_picker: ^1.2.1
  file_selector: ^1.1.0
  file_selector_macos: ^0.9.5
  face_detection_tflite:
    path: ../
  flutter_colorpicker: ^1.1.0
  camera: ^0.12.0
  camera_desktop: ^1.2.1
  sensors_plus: ^6.1.1
  video_player: ^2.9.2
  path_provider: ^2.1.5

# video_player_avfoundation 2.9.7's macOS Swift Package imports the iOS-only
# <Flutter/Flutter.h> module, which fails to build on macOS ("module 'Flutter'
# not found"). Pin to 2.9.4, the last version that builds on macOS, until the
# upstream package is fixed.
dependency_overrides:
  video_player_avfoundation: 2.9.4
  # TEMPORARY (CompiledModel testing, do not publish with this):
  # use flutter_litert from the compiled-model branch instead of pub.dev,
  # pinned to a commit so fresh clones resolve reproducibly.
  flutter_litert:
    git:
      url: https://github.com/hugocornellier/flutter_litert.git
      ref: eca39ff73ffc750cc3aa68f70e5ba733a2d8e0ab

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_litert: ^2.8.3
  google_mlkit_face_detection: ^0.13.2

hooks:
  user_defines:
    dartcv4:
      include_modules:
        - imgcodecs
        - imgproc
        - videoio

flutter:
  uses-material-design: true
  assets:
    - assets/samples/
    - assets/samples/embedding_test/
    - assets/samples/demo/
    - assets/beach_background.jpg
